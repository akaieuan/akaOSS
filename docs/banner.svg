<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" role="img" aria-label="HITL Kit — Human-in-the-loop AI, measured properly">
  <!-- Dark canvas -->
  <rect width="1200" height="420" fill="#0a0a0a"/>

  <!-- Subtle blue gradient line at top edge -->
  <defs>
    <linearGradient id="blueFade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"  stop-color="#007AFF" stop-opacity="0"/>
      <stop offset="50%" stop-color="#007AFF" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#007AFF" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="1200" height="1" fill="url(#blueFade)"/>

  <!-- Loop icon, top-left -->
  <g transform="translate(80, 100)" stroke="#007AFF" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M 40 40 C 28 22, 6 22, 12 40 C 6 58, 28 58, 40 40 C 52 22, 74 22, 68 40 C 74 58, 52 58, 40 40"/>
  </g>

  <!-- Mono eyebrow -->
  <text x="80" y="235"
        font-family="ui-monospace, SFMono-Regular, 'SF Mono', Menlo, monospace"
        font-size="13" fill="#8a8a8a" letter-spacing="2.5">
    HUMAN-IN-THE-LOOP AI
  </text>

  <!-- Primary title -->
  <text x="80" y="305"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', system-ui, sans-serif"
        font-size="84" font-weight="300" fill="#ededed" letter-spacing="-2.6">HITL Kit</text>

  <!-- Accent tagline -->
  <text x="80" y="360"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', system-ui, sans-serif"
        font-size="28" font-weight="300" letter-spacing="-0.6">
    <tspan fill="#ededed">Human-in-the-loop AI, </tspan><tspan fill="#007AFF">measured properly</tspan><tspan fill="#ededed">.</tspan>
  </text>

  <!-- Supporting line -->
  <text x="80" y="395"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', system-ui, sans-serif"
        font-size="14" fill="#8a8a8a" letter-spacing="0">
    A design system, component library, and open perspective paper on why 95% of enterprise AI fails.
  </text>

  <!-- Right-side geometric echo: grid of dots -->
  <g fill="#1a1a1a">
    <circle cx="900"  cy="120" r="2"/>
    <circle cx="920"  cy="120" r="2"/>
    <circle cx="940"  cy="120" r="2"/>
    <circle cx="960"  cy="120" r="2"/>
    <circle cx="980"  cy="120" r="2"/>
    <circle cx="1000" cy="120" r="2"/>
    <circle cx="1020" cy="120" r="2"/>
    <circle cx="1040" cy="120" r="2"/>
    <circle cx="1060" cy="120" r="2"/>
    <circle cx="1080" cy="120" r="2"/>
    <circle cx="1100" cy="120" r="2"/>

    <circle cx="900"  cy="140" r="2"/>
    <circle cx="920"  cy="140" r="2"/>
    <circle cx="940"  cy="140" r="2"/>
    <circle cx="960"  cy="140" r="2"/>
    <circle cx="980"  cy="140" r="2"/>
    <circle cx="1000" cy="140" r="2"/>
    <circle cx="1020" cy="140" r="2"/>
    <circle cx="1040" cy="140" r="2"/>
    <circle cx="1060" cy="140" r="2"/>
    <circle cx="1080" cy="140" r="2"/>
    <circle cx="1100" cy="140" r="2"/>

    <circle cx="900"  cy="160" r="2"/>
    <circle cx="920"  cy="160" r="2"/>
    <circle cx="940"  cy="160" r="2"/>
    <circle cx="960"  cy="160" r="2"/>
    <circle cx="980"  cy="160" r="2"/>
    <circle cx="1000" cy="160" r="2"/>
    <circle cx="1020" cy="160" r="2"/>
    <circle cx="1040" cy="160" r="2"/>
    <circle cx="1060" cy="160" r="2"/>
    <circle cx="1080" cy="160" r="2"/>
    <circle cx="1100" cy="160" r="2"/>

    <circle cx="900"  cy="180" r="2"/>
    <circle cx="920"  cy="180" r="2"/>
    <circle cx="940"  cy="180" r="2"/>
    <circle cx="960"  cy="180" r="2"/>
    <circle cx="980"  cy="180" r="2"/>
    <circle cx="1000" cy="180" r="2"/>
    <circle cx="1020" cy="180" r="2"/>
    <circle cx="1040" cy="180" r="2"/>
    <circle cx="1060" cy="180" r="2"/>
    <circle cx="1080" cy="180" r="2"/>
    <circle cx="1100" cy="180" r="2"/>

    <circle cx="900"  cy="200" r="2"/>
    <circle cx="920"  cy="200" r="2"/>
    <circle cx="940"  cy="200" r="2"/>
    <circle cx="960"  cy="200" r="2"/>
    <circle cx="980"  cy="200" r="2"/>
    <circle cx="1000" cy="200" r="2"/>
    <circle cx="1020" cy="200" r="2"/>
    <circle cx="1040" cy="200" r="2"/>
    <circle cx="1060" cy="200" r="2"/>
    <circle cx="1080" cy="200" r="2"/>
    <circle cx="1100" cy="200" r="2"/>
  </g>

  <!-- Active blue dots in a cross pattern to echo the loop -->
  <g fill="#007AFF">
    <circle cx="980"  cy="160" r="2.5"/>
    <circle cx="1000" cy="160" r="2.5"/>
    <circle cx="1020" cy="160" r="2.5"/>
    <circle cx="960"  cy="160" r="2"/>
    <circle cx="1040" cy="160" r="2"/>
  </g>
</svg>
