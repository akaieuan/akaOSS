name: Registry

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    name: Verify registry is built
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Rebuild registry
        run: pnpm registry:build

      - name: Check for drift
        run: |
          if ! git diff --exit-code public/r/ registry.json; then
            echo "::error::public/r/*.json is out of sync with registry.json."
            echo "Run 'pnpm registry:build' locally and commit the output."
            exit 1
          fi
          echo "Registry artifacts are up to date."
